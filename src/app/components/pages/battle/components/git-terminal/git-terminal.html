<div class="git-terminal">
  <div class="git-terminal__header">Terminal — Git</div>

  <div class="git-terminal__lines">
    @for (line of terminalService.lines(); track line.id) {
      @if (line.type === 'command') {
        <div class="git-terminal__command">
          <span class="git-terminal__prompt">$</span> {{ line.text }}
        </div>
      } @else {
        <pre class="git-terminal__output">{{ line.text }}</pre>
      }
    }
  </div>

  <form class="git-terminal__input-row" (ngSubmit)="runCommand()">
    <span class="git-terminal__prompt">$</span>
    <input
      class="git-terminal__input"
      type="text"
      [ngModel]="draft()"
      (ngModelChange)="draft.set($event)"
      name="terminalDraft"
      placeholder="git status"
    >
  </form>
</div>
