<app-king-dialogue-layout
  speech="Agora crie uma senha forte para proteger sua conta.">

  <div class="step-password">
    <label class="step-password__label" for="password">Senha</label>
    <div class="step-password__input-wrapper">
      <input
        id="password"
        [type]="showPassword() ? 'text' : 'password'"
        class="step-password__input"
        [(ngModel)]="password"
        autocomplete="new-password">
      <button
        class="step-password__toggle"
        type="button"
        (click)="toggleShowPassword()">
        {{ showPassword() ? 'Ocultar' : 'Ver' }}
      </button>
    </div>

    <div class="step-password__strength">
      <div class="step-password__strength-bar">
        <div class="step-password__strength-fill" [style.width.%]="strength().percent"></div>
      </div>
      <span class="step-password__strength-label">{{ strength().label }}</span>
    </div>

    <label class="step-password__label" for="confirmPassword">Confirmar senha</label>
    <input
      id="confirmPassword"
      [type]="showPassword() ? 'text' : 'password'"
      class="step-password__input"
      [(ngModel)]="confirmPassword"
      autocomplete="new-password">

    @if (confirmPassword().length > 0 && !passwordsMatch()) {
      <span class="step-password__error">As senhas não coincidem</span>
    }

    <ul class="step-password__checklist">
      @for (rule of ruleResults(); track rule.label) {
        <li class="step-password__rule" [class.step-password__rule--passed]="rule.passed">
          <span class="step-password__check">{{ rule.passed ? '✔' : '○' }}</span>
          {{ rule.label }}
        </li>
      }
    </ul>

    <button
      class="step-password__continue"
      type="button"
      [disabled]="!canContinue()"
      (click)="continue()">
      Continuar
    </button>
  </div>
</app-king-dialogue-layout>
