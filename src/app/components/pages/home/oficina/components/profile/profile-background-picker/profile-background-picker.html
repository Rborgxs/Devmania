<div class="background-picker">
  <h3 class="background-picker__title">Fundo do Perfil</h3>

  <div class="background-picker__options">
    @for (bg of profileService.backgrounds(); track bg.id) {
      <button
        class="background-option"
        [class.background-option--selected]="profileService.profile().backgroundId === bg.id"
        [style.background]="bg.gradient"
        type="button"
        (click)="profileService.setBackground(bg.id)"
      ></button>
    }
  </div>
</div>
