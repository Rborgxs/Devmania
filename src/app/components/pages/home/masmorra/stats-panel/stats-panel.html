<section class="stats-panel">
  <h2 class="stats-panel__title">Teu Desempenho</h2>

  <div class="stats-panel__cards">
    <div class="stats-card">
      <span class="stats-card__value">{{ cards.coinsEarned }}</span>
      <span class="stats-card__label">Moedas Ganhas</span>
    </div>
    <div class="stats-card">
      <span class="stats-card__value">{{ cards.avgTimePerChallenge }}</span>
      <span class="stats-card__label">Tempo Médio</span>
    </div>
    <div class="stats-card">
      <span class="stats-card__value">{{ cards.accuracyPercent }}%</span>
      <span class="stats-card__label">Percentual de Acertos</span>
    </div>
    <div class="stats-card">
      <span class="stats-card__value">{{ cards.topLanguage }}</span>
      <span class="stats-card__label">Linguagem Mais Usada</span>
    </div>
  </div>

  <div class="stats-panel__charts">
    <div class="chart-box">
      <h3 class="chart-box__title">Atividade Semanal</h3>
      <apx-chart
        [series]="barSeries"
        [chart]="barChart"
        [xaxis]="barXAxis"
        [plotOptions]="barPlotOptions"
        [fill]="barFill"
        [dataLabels]="barDataLabels"
        [responsive]="chartResponsive"
      ></apx-chart>
    </div>

    <div class="chart-box">
      <h3 class="chart-box__title">Eficácia por Dificuldade</h3>
      <apx-chart
        [series]="pieSeries"
        [chart]="pieChart"
        [labels]="pieLabels"
        [fill]="pieFill"
        [stroke]="pieStroke"
        [legend]="pieLegend"
        [responsive]="chartResponsive"
      ></apx-chart>
    </div>
  </div>
</section>
