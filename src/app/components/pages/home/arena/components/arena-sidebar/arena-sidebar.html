<aside class="arena-sidebar">
  <section class="arena-sidebar__tournaments">
    <button class="arena-sidebar__tournament-btn" type="button" (click)="openTournaments()">
      <span class="arena-sidebar__tournament-icon arena-sidebar__tournament-icon--tournaments"></span>
      Torneios
    </button>
    <button class="arena-sidebar__tournament-btn" type="button" (click)="openGuildTournament()">
      <span class="arena-sidebar__tournament-icon arena-sidebar__tournament-icon--guild"></span>
      Torneio de Guildas
    </button>
    <button class="arena-sidebar__tournament-btn" type="button" (click)="openFriends()">
      <span class="arena-sidebar__tournament-icon arena-sidebar__tournament-icon--friends"></span>
      Amigos
    </button>
  </section>

  <section class="arena-friends">
    <h3 class="arena-friends__title">Amigos Online</h3>

    @if (onlineFriends().length === 0) {
      <p class="arena-friends__empty">Nenhum amigo online agora.</p>
    } @else {
      <ul class="arena-friends__list">
        @for (friend of onlineFriends(); track friend.id) {
          <li class="arena-friends__item">
            <div class="arena-friends__avatar-wrapper">
              <img class="arena-friends__avatar" [src]="friend.avatar" [alt]="friend.name">
              <img class="arena-friends__frame" src="assets/icons/mainavatar_frame.png" alt="">
              <span class="arena-friends__status" [attr.data-status]="friend.status"></span>
            </div>
            <div class="arena-friends__info">
              <span class="arena-friends__name">{{ friend.name }}</span>
              <span class="arena-friends__role">{{ friend.role }}</span>
            </div>
            <button class="arena-friends__challenge" type="button" title="Desafiar para duelo">⚔️</button>
          </li>
        }
      </ul>
    }
  </section>
</aside>
