<div class="subject-card" (click)="select.emit(subject())" role="button" tabindex="0" (keydown.enter)="select.emit(subject())">
  <div class="subject-card__header">
    <span class="subject-card__name">{{ subject().name }}</span>
    <span class="subject-card__level" [attr.data-level]="subject().level">{{ subject().level }}</span>
  </div>
  <p class="subject-card__description">{{ subject().description }}</p>

  <div class="subject-card__hover-action">
    <span class="subject-card__hover-btn">
      <span class="subject-card__hover-icon">⚔️</span>
      Iniciar Treino
    </span>
  </div>
</div>
