<nav class="navbar" [class.navbar--filled]="isFilled()" [class.navbar--menu-open]="isMenuOpen()" aria-label="Navegação principal">
  <div class="navbar__bg"></div>

  <div class="navbar__logo-slot">
    @if (isFilled()) {
      <a class="navbar__logo" routerLink="/">
        <img src="assets/logo_simbolo_devmania.png" alt="Devmania">
      </a>
    }
  </div>

  <a class="navbar__mobile-logo" routerLink="/" aria-label="Devmania">
    <img src="assets/logo_nome_devmania.png" alt="Devmania">
  </a>

  <button
    class="navbar__burger"
    type="button"
    (click)="toggleMenu()"
    [attr.aria-expanded]="isMenuOpen()"
    aria-label="Abrir menu de navegação"
  >
    <span class="navbar__burger-bar"></span>
    <span class="navbar__burger-bar"></span>
    <span class="navbar__burger-bar"></span>
  </button>

  <ul class="navbar__links" [class.navbar__links--open]="isMenuOpen()">
    <li><a href="#hero" (click)="scrollToSection($event, 'hero')">Home</a></li>
    <li><a href="#missaoSecao" (click)="scrollToSection($event, 'missaoSecao')">Público-alvo</a></li>
    <li><a href="#desafiosSecao" (click)="scrollToSection($event, 'desafiosSecao')">Ferramentas</a></li>
    <li><a href="#sobreSecao" (click)="scrollToSection($event, 'sobreSecao')">Sobre nós</a></li>
    <li class="navbar__links-mobile-action">
      <a class="navbar__btn navbar__btn--ghost" id="login_btn_mobile" routerLink="/login" (click)="closeMenu()">
        Entrar no mundo
      </a>
    </li>
  </ul>

  <div class="navbar__actions">
    @if (isFilled()) {
      <div class="navbar__actions-inner">
        <a class="navbar__btn navbar__btn--ghost" id="login_btn" routerLink="/login">
          <img src="assets/icons/login_btn.png" alt="Entrar no mundo">
        </a>
      </div>
    }
  </div>
</nav>
