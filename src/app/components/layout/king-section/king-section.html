<section class="king-section" id="desafiosSecao" #sectionRef>
  <div class="king-section__intro">
    <h2 class="king-section__title">Mestres da Jornada</h2>
    <p class="king-section__subtitle">
      Receba orientações, descubra novas estratégias e aprenda a vencer seus duelos.
    </p>
  </div>

  <div class="king-section__stage">
    <div class="king-section__king-wrapper">
      <img class="king-section__king-image" src="assets/characters/rei_default.jpeg" alt="Rei mestre">
    </div>

    <div class="king-section__dialogue">
      @for (bubble of bubbles; track bubble.mode; let i = $index) {
        <div class="king-section__bubble-trigger" [attr.data-bubble-index]="i">
          <div class="king-section__bubble" [class.king-section__bubble--active]="activeBubble() === i">
            <span class="king-section__bubble-tag">{{ bubble.label }}</span>
            <p class="king-section__bubble-text">{{ bubble.kingQuote }}</p>
          </div>
        </div>
      }
    </div>
  </div>
</section>
