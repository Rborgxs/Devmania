<section class="carousel" id="missaoSecao">
  <h2 class="carousel__title">Um mundo feito por devs e para devs</h2>

  <div class="carousel__stage">
    <div class="carousel__dots">
      @for (slide of slides; track slide.title; let i = $index) {
        <button
          class="carousel__dot"
          [class.carousel__dot--active]="activeSlide() === i"
          (click)="setSlide(i)"
          [attr.aria-label]="'Ver ' + slide.title"
          type="button">
        </button>
      }
    </div>

    <div class="flip-card" [class.flip-card--flipped]="isCurrentFlipped()">
      <div class="flip-card__inner">
        <button class="flip-card__face flip-card__front" type="button" (click)="toggleFlip()">
          <img [src]="currentSlide.frontImage" [alt]="currentSlide.title">
        </button>

        <button class="flip-card__face flip-card__back" type="button" (click)="toggleFlip()">
          <img [src]="currentSlide.backImage" [alt]="currentSlide.title + ' - status'">
        </button>
      </div>
    </div>

    <div class="carousel__content">
      <h3 class="carousel__content-title">{{ currentSlide.title }}</h3>
      <p class="carousel__content-description">{{ currentSlide.description }}</p>

      <ul class="carousel__features">
        @for (feature of currentSlide.features; track feature) {
          <li class="carousel__feature">
            <span class="carousel__feature-star">★</span>
            <span>{{ feature }}</span>
          </li>
        }
      </ul>
    </div>
  </div>
</section>
